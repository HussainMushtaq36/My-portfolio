<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussain_portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
        }
        body{
            background-color: rgb(0, 0, 33);
            color:white;
            font-family: 'Poppins' sans-serif;
        }
        nav{
            display:flex;
            justify-content: space-around;
            align-items: center;
            background-color: rgb(4, 4, 68);
            height: 80px;
         
        }
        nav ul{
            display: flex;
            justify-content: center;

        }
        nav ul li{
            list-style: none;
            margin:0 23px;

        }
        .leftnav{
            font-size: 1.5rem;
        }
        .firstsection{
            display: flex;
            justify-content:space-around;
            margin: 80px 0px;
            align-items: center;
        }
         .firstsection >div{
            width: 30%;
         }
        
        .rightsection img{
            width: 80%;
            transition: .3s ease;
        }
        .rightsection img:hover{
             scale: 1.1;   
        }
        .leftsection {
            font-size: 3rem;
        }
        .purple{
            color: rgb(111, 63, 156);
        }


    </style>
</head>
<body>
    <header>
        <nav>
            <div class="leftnav">Hussain_portfolio</div>
            <div class="rightnav">
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Projects</li>
                    <li>Contact  Me</li>

                </ul>
            </div>
    </nav>
    </header>
    <main>
        <section class="firstsection">
            <div class="leftsection">
                <div>Hi, my name is <span class="purple"> Hussain Mushtaq</span></div>
                <div>and I am a very passionate student who wants to grow.</div>
            </div>
            <div class="rightsection">
                <img src="pic.png">
            </div>
        </section>
    </main>
</body>
</html>
